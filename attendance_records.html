<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Attendance Records</title>
    <link rel="stylesheet" href="../static/style.css">
</head>

<body>
    <div class="dashboard-container">
        <div class="dashboard-box">
            <h1>Attendance Records</h1>

            <table>
                <tr>
                    <th>Name</th>
                    <th>Time</th>
                </tr>
                {% for record in records %}
                <tr>
                    <td>{{ record.name }}</td>
                    <td>{{ record.time }}</td>
                </tr>
                {% endfor %}
            </table>

            <!-- BUTTONS -->
            <div class="btn-group">
    <button onclick="window.location.href='/dashboard'">
        Back to Dashboard
    </button>

    <button class="feedback-btn" onclick="openPopup()">
        Rate Us & Feedback
    </button>
</div>
        </div>
    </div>

    <!-- POPUP -->
    <div id="feedbackPopup" class="popup">
        <div class="popup-content">
            <h2>Rate Us ⭐</h2>

            <div class="stars">
                <span onclick="setRating(1)">★</span>
                <span onclick="setRating(2)">★</span>
                <span onclick="setRating(3)">★</span>
                <span onclick="setRating(4)">★</span>
                <span onclick="setRating(5)">★</span>
            </div>

            <textarea id="feedbackText" placeholder="Write your feedback..."></textarea>

            <br><br>
            <button onclick="submitFeedback()">Submit</button>
            <button onclick="closePopup()">Close</button>
        </div>
    </div>

    <script>
        let rating = 0;

        function openPopup() {
            document.getElementById("feedbackPopup").style.display = "block";
        }

        function closePopup() {
            document.getElementById("feedbackPopup").style.display = "none";
        }

        function setRating(stars) {
            rating = stars;
            let allStars = document.querySelectorAll(".stars span");

            allStars.forEach((star, index) => {
                star.classList.toggle("active", index < stars);
            });
        }

        function submitFeedback() {
            let feedback = document.getElementById("feedbackText").value;

            alert("Rating: " + rating + " ⭐\nFeedback: " + feedback);

            closePopup();
        }
    </script>

</body>
</html>
